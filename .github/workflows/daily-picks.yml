name: Daily Picks

on:
  schedule:
    # 07:00 UTC = 16:00 KST (weekdays, post market close)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api,data]"

      - name: Cache market data
        run: python scripts/cache_market_data.py --universe config/universe_krx_backtest.csv

      - name: Validate cache
        run: python scripts/validate_cache.py --universe config/universe_krx_backtest.csv

      - name: Run daily pipeline
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python scripts/run_daily_pipeline.py --universe config/universe_krx_backtest.csv

      - name: Phase 6 validation
        run: python scripts/validate_phase6_picks.py --universe config/universe_krx_backtest.csv

      - name: Verify adopted-only scoring
        run: python scripts/verify_adopted_scoring.py

      - name: Regime baseline validation
        run: python scripts/validate_regime_baselines.py --universe config/universe_krx_backtest.csv

      - name: Recommendation threshold check
        run: python scripts/tune_recommendation_thresholds.py --universe config/universe_krx_backtest.csv --regime current --verify-only

      - name: Recommendation threshold check (full mode baseline)
        run: python scripts/tune_recommendation_thresholds.py --universe config/universe_krx_backtest.csv --settings config/settings_full.yaml --recommendation-config config/recommendation_full_v1.yaml --regime current --verify-only

      - name: Upload picks artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-picks
          path: output/picks_*.json
          if-no-files-found: warn
