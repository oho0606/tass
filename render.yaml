services:
  - type: web
    name: tass-backend
    runtime: python
    buildCommand: pip install -e ".[api,data]"
    startCommand: alembic upgrade head && uvicorn api.app:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tass-db
          property: connectionString
      - key: REDIS_URL
        sync: false   # Upstash Redis URL — set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: LOG_LEVEL
        value: INFO
      - key: TIMEZONE
        value: Asia/Seoul
      - key: CORS_ORIGINS
        sync: false   # Set to your Vercel app URL in dashboard, e.g. https://tass.vercel.app
      - key: KIS_APP_KEY
        sync: false
      - key: KIS_APP_SECRET
        sync: false
      - key: KIS_BASE_URL
        value: https://openapi.koreainvestment.com:9443

databases:
  - name: tass-db
    plan: free
    databaseName: tass
    user: tass
